<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C.I.A. DATABASE</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .search-bar { width: 100%; padding: 15px; background: #0a0a0a; border: 1px solid #4cff7a; margin-bottom: 30px; font-size: 1.1rem; }
    .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
  </style>
</head>
<body>
  <div class="security-bar">
    <span>CRYPTIC INTELLIGENCE AGENCY • DATABASE ACCESS</span>
    <span id="live-time"></span>
  </div>

  <div class="container">
    <nav class="sidebar">
      <div class="logo">
        <h1>C.I.A.</h1>
      </div>
      <ul>
        <li onclick="window.location.href='index.html'">← HOME</li>
        <li onclick="window.location.href='database.html'">DATABASE</li>
        <li onclick="window.location.href='incidents.html'">INCIDENTS</li>
        <li onclick="window.location.href='blacksites.html'">BLACK SITES</li>
      </ul>
    </nav>

    <main class="main-content">
      <h1>CLASSIFIED ARCHIVE</h1>
      <input type="text" class="search-bar" placeholder="SEARCH ENTITIES, INCIDENTS, OR LOCATIONS..." onkeyup="if(event.key==='Enter') alert('Search functionality active in full version')">

      <div class="category-grid">
        <div class="card" onclick="window.location.href='cryptid-profiles/howler.html'">
          <h3>CRYPTID DATABASE</h3>
          <p>47 documented entities</p>
        </div>
        <div class="card">
          <h3>BIOHAZARD ARCHIVE</h3>
          <p>19 active strains</p>
        </div>
        <div class="card">
          <h3>INCIDENT REPORTS</h3>
          <p>312 sealed files</p>
        </div>
        <div class="card">
          <h3>BLACK SITE REGISTRY</h3>
          <p>14 operational facilities</p>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
